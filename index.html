<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="SBTI 恶搞人格测试 - 20道题测出你的社会底层人格">
  <meta name="og:image" content="">
  <title>SBTI 恶搞人格测试</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink: #ff6eb4;
      --yellow: #ffd93d;
      --cyan: #00d9ff;
      --purple: #bf5fff;
      --green: #6bcb77;
      --gradient: linear-gradient(135deg, #ff6eb4, #ffd93d, #00d9ff);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      overflow-x: hidden;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; min-height: 100vh; }

    /* 封面页 */
    .cover-page { text-align: center; padding-top: 80px; animation: fadeIn 0.8s ease; }
    .cover-emoji { font-size: 100px; margin-bottom: 20px; animation: bounce 2s infinite; }
    .cover-title { font-size: 42px; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .cover-subtitle { font-size: 18px; color: rgba(255,255,255,0.7); margin-bottom: 40px; }
    .cover-desc { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 40px; text-align: left; }
    .cover-desc p { font-size: 15px; line-height: 1.8; color: rgba(255,255,255,0.85); margin-bottom: 10px; }
    .start-btn {
      width: 100%; padding: 18px; border: none; border-radius: 50px;
      background: var(--gradient); color: #1a1a2e; font-size: 20px; font-weight: 800;
      cursor: pointer; transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 10px 40px rgba(255,110,180,0.4);
    }
    .start-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 50px rgba(255,110,180,0.5); }

    /* 答题页 */
    .quiz-page { display: none; padding-top: 40px; animation: slideUp 0.5s ease; }
    .progress-bar { display: flex; gap: 4px; margin-bottom: 30px; }
    .progress-dot { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.2); transition: all 0.3s; }
    .progress-dot.done { background: var(--pink); }
    .progress-dot.current { background: var(--yellow); transform: scaleY(1.5); }
    .question-card { background: rgba(255,255,255,0.08); border-radius: 24px; padding: 30px 25px; margin-bottom: 25px; backdrop-filter: blur(10px); }
    .question-num { font-size: 14px; color: var(--cyan); margin-bottom: 15px; font-weight: 600; }
    .question-text { font-size: 22px; font-weight: 700; line-height: 1.5; margin-bottom: 25px; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      width: 100%; padding: 16px 20px; border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px; background: rgba(255,255,255,0.05); color: #fff;
      font-size: 16px; text-align: left; cursor: pointer; transition: all 0.3s;
    }
    .option-btn:hover { border-color: var(--pink); background: rgba(255,110,180,0.15); transform: translateX(5px); }
    .option-btn:active { transform: scale(0.98); }

    /* 结果页 */
    .result-page { display: none; text-align: center; padding-top: 40px; animation: fadeIn 1s ease; }
    .result-badge { font-size: 80px; margin-bottom: 10px; }
    .result-type { font-size: 48px; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .result-en { font-size: 24px; color: var(--cyan); margin-bottom: 15px; font-weight: 600; }
    .result-slogan { font-size: 18px; color: var(--yellow); margin-bottom: 30px; font-weight: 600; }
    .result-desc { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 25px; margin-bottom: 30px; text-align: left; }
    .result-desc p { font-size: 15px; line-height: 1.8; color: rgba(255,255,255,0.85); margin-bottom: 10px; }
    .dimensions-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--purple); }
    .dimension-item { margin-bottom: 18px; }
    .dimension-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
    .dimension-name { color: rgba(255,255,255,0.8); }
    .dimension-value { font-weight: 700; }
    .dimension-bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .dimension-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

    /* 分享按钮组 */
    .share-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    .share-img-btn {
      width: 100%; padding: 16px; border: none; border-radius: 50px;
      background: linear-gradient(135deg, #07c160, #06ad56);
      color: #fff; font-size: 18px; font-weight: 700; cursor: pointer;
      transition: transform 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .share-img-btn:hover { transform: scale(1.03); }
    .share-img-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .share-link-btn {
      width: 100%; padding: 14px; border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50px; background: transparent; color: #fff;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: all 0.3s;
    }
    .share-link-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .retest-btn {
      width: 100%; padding: 14px; border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50px; background: transparent; color: rgba(255,255,255,0.5);
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 5px;
      transition: all 0.3s;
    }
    .retest-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.7); }

    /* 图片生成中提示 */
    .generate-tip { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }

    /* 分享弹窗 */
    .share-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: flex-end; justify-content: center; animation: fadeIn 0.3s ease; }
    .share-modal.active { display: flex; }
    .share-panel {
      background: linear-gradient(180deg, #1e2a4a 0%, #16213e 100%);
      border-radius: 28px 28px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 30px 25px 50px;
      animation: slideUp 0.4s ease;
    }
    .share-panel-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 25px; }
    .share-link-box {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex; gap: 10px; align-items: center; margin-bottom: 20px;
    }
    .share-link-text { flex: 1; font-size: 13px; color: rgba(255,255,255,0.7); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; word-break: break-all; }
    .copy-link-btn {
      padding: 8px 16px; background: var(--pink); border: none; border-radius: 20px;
      color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .share-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
    .share-icon-btn {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 18px 10px; background: rgba(255,255,255,0.06);
      border: none; border-radius: 16px; cursor: pointer; transition: transform 0.2s;
    }
    .share-icon-btn:hover { transform: scale(1.05); }
    .share-icon-btn:active { transform: scale(0.95); }
    .share-icon-btn .icon { font-size: 32px; }
    .share-icon-btn .label { font-size: 12px; color: rgba(255,255,255,0.7); }
    .share-wechat-tip { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 15px; }
    .share-copy-success { color: var(--green); font-size: 13px; text-align: center; margin-bottom: 10px; display: none; }
    .share-close-btn {
      width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px; background: transparent; color: rgba(255,255,255,0.6);
      font-size: 15px; cursor: pointer;
    }

    /* 分享图片预览 */
    .share-card-preview { background: rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; margin-bottom: 20px; text-align: center; }
    .share-card-preview .preview-badge { font-size: 50px; }
    .share-card-preview .preview-type { font-size: 28px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .share-card-preview .preview-slogan { font-size: 14px; color: var(--yellow); margin-top: 8px; }

    /* 动画 */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-200px) rotate(720deg); opacity: 0; } }
    .confetti { position: fixed; width: 10px; height: 10px; border-radius: 50%; animation: confetti 2s ease-out forwards; pointer-events: none; }
    .loading { text-align: center; padding-top: 100px; }
    .loading-emoji { font-size: 60px; animation: bounce 1s infinite; }
    .loading-text { font-size: 20px; margin-top: 20px; color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div class="container">
    <!-- 封面页 -->
    <div id="coverPage" class="cover-page">
      <div class="cover-emoji">🎭</div>
      <h1 class="cover-title">SBTI</h1>
      <p class="cover-subtitle">恶搞人格测试</p>
      <div class="cover-desc">
        <p>🔮 测试共 20 道题，帮你彻底认清自己</p>
        <p>🎯 测出你是哪种「社会底层人格」</p>
        <p>😂 完全不专业，完全不严肃</p>
        <p>⚠️ 纯属娱乐，后果自负</p>
      </div>
      <button class="start-btn" onclick="startQuiz()">开始测试 →</button>
    </div>

    <!-- 答题页 -->
    <div id="quizPage" class="quiz-page">
      <div class="progress-bar" id="progressBar"></div>
      <div class="question-card">
        <div class="question-num" id="questionNum">第 1 / 20 题</div>
        <div class="question-text" id="questionText"></div>
        <div class="options" id="options"></div>
      </div>
    </div>

    <!-- 加载页 -->
    <div id="loadingPage" class="loading" style="display:none;">
      <div class="loading-emoji">🧮</div>
      <div class="loading-text">正在分析你的灵魂...</div>
    </div>

    <!-- 结果页 -->
    <div id="resultPage" class="result-page">
      <div class="result-badge" id="resultBadge"></div>
      <div class="result-type" id="resultType"></div>
      <div class="result-en" id="resultEn"></div>
      <div class="result-slogan" id="resultSlogan"></div>
      <div class="result-desc" id="resultDesc"></div>
      <div class="dimensions-title">📊 你的维度分析</div>
      <div id="dimensionsChart"></div>

      <!-- 分享操作区 -->
      <div class="share-actions">
        <button class="share-img-btn" id="shareImgBtn" onclick="generateShareImage()">
          <span>📸</span> 生成分享图片
        </button>
        <button class="share-link-btn" onclick="openShareModal()">
          🔗 复制链接分享
        </button>
        <button class="retest-btn" onclick="retest()">🔄 重新测试</button>
      </div>
    </div>
  </div>

  <!-- 分享链接弹窗 -->
  <div class="share-modal" id="shareModal" onclick="closeShareModal(event)">
    <div class="share-panel" onclick="event.stopPropagation()">
      <div class="share-panel-title">复制链接分享</div>
      <div class="share-copy-success" id="copySuccess">✅ 链接已复制，快去分享吧！</div>
      <div class="share-link-box">
        <div class="share-link-text" id="shareLinkText"></div>
        <button class="copy-link-btn" onclick="copyShareLink()">复制链接</button>
      </div>
      <div class="share-buttons">
        <button class="share-icon-btn" onclick="shareToWechat()"><span class="icon">💬</span><span class="label">微信</span></button>
        <button class="share-icon-btn" onclick="shareToWeibo()"><span class="icon">🔴</span><span class="label">微博</span></button>
        <button class="share-icon-btn" onclick="shareToQQ()"><span class="icon">🐧</span><span class="label">QQ</span></button>
        <button class="share-icon-btn" onclick="shareToTwitter()"><span class="icon">𝕏</span><span class="label">X</span></button>
        <button class="share-icon-btn" onclick="shareToTelegram()"><span class="icon">✈️</span><span class="label">TG</span></button>
        <button class="share-icon-btn" onclick="copyShareLink()"><span class="icon">🔗</span><span class="label">复制</span></button>
      </div>
      <p class="share-wechat-tip">微信内置浏览器无法直接分享，点「复制链接」发给朋友</p>
      <button class="share-close-btn" onclick="closeShareModal()">关闭</button>
    </div>
  </div>

  <!-- 隐藏的分享卡片（用于生成图片） -->
  <div id="shareCardCanvas" style="position:fixed;left:-9999px;top:-9999px;width:430px;padding:40px 32px;background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);border-radius:28px;text-align:center;display:none;">
    <div style="font-size:70px;margin-bottom:16px;" id="cardBadge"></div>
    <div style="font-size:44px;font-weight:900;background:linear-gradient(135deg,#ff6eb4,#ffd93d,#00d9ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;" id="cardType"></div>
    <div style="font-size:20px;color:#00d9ff;margin-bottom:8px;font-weight:600;" id="cardEn"></div>
    <div style="font-size:18px;color:#ffd93d;margin-bottom:28px;font-weight:600;" id="cardSlogan"></div>
    <div style="background:rgba(255,255,255,0.08);border-radius:20px;padding:20px;margin-bottom:20px;text-align:left;" id="cardDesc"></div>
    <div id="cardDims"></div>
    <div style="margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1);">
      <div style="font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:4px;">SBTI 恶搞人格测试</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.3);">扫码或打开 SBTI 测试你的性格</div>
    </div>
  </div>

  <script>
    const questions = [{"id":1,"q":"你朋友凌晨三点发来「在吗」，你会？","o":[{"t":"秒回「在」然后后悔","s":{"社恐指数":3,"内心戏浓度":2}},{"t":"已读不回，明天假装没看到","s":{"社恐指数":1,"表面正常值":3}},{"t":"直接拉黑，清净","s":{"社恐指数":5,"嘴硬程度":4}},{"t":"回「在」然后发「？」","s":{"整活频率":3,"嘴硬程度":2}}]},{"id":2,"q":"你觉得自己是？","o":[{"t":"人间清醒","s":{"人间清醒度":5,"自我感觉良好度":3}},{"t":"人间水分","s":{"摆烂力":4,"自我感觉良好度":1}},{"t":"人间 bug","s":{"整活频率":4,"表面正常值":1}},{"t":"人间 NPC","s":{"工具人倾向":5,"社恐指数":3}}]},{"id":3,"q":"老板说「下班前给我」，你会？","o":[{"t":"立刻做完，提前交付","s":{"打工人觉悟":5,"工具人倾向":4}},{"t":"拖到下班前5分钟提交","s":{"拖延症等级":4,"摆烂力":3}},{"t":"假装没看到消息","s":{"摆烂力":5,"嘴硬程度":3}},{"t":"问「哪个下班？」","s":{"整活频率":5,"嘴硬程度":4}}]},{"id":4,"q":"你朋友借钱，你会？","o":[{"t":"立刻转账，不问原因","s":{"工具人倾向":5,"人间清醒度":1}},{"t":"问清楚用途，再决定","s":{"人间清醒度":4,"表面正常值":3}},{"t":"说「我最近也穷」","s":{"嘴硬程度":3,"摆烂力":2}},{"t":"直接拉黑","s":{"嘴硬程度":5,"社恐指数":3}}]},{"id":5,"q":"你如何看待加班？","o":[{"t":"加班是我的使命","s":{"打工人觉悟":5,"工具人倾向":5}},{"t":"看情况，有加班费就加","s":{"人间清醒度":4,"摆烂力":2}},{"t":"绝对不加班，到点就走","s":{"摆烂力":4,"嘴硬程度":3}},{"t":"假装加班，实际摸鱼","s":{"整活频率":4,"摆烂力":3}}]},{"id":6,"q":"你朋友说「我没事」，你觉得？","o":[{"t":"好的，那就没事","s":{"社恐指数":3,"人间清醒度":1}},{"t":"肯定有事，继续追问","s":{"内心戏浓度":4,"玻璃心厚度":3}},{"t":"装作没听到","s":{"社恐指数":4,"摆烂力":3}},{"t":"回「没事就好，我去打游戏了」","s":{"网瘾深度":4,"摆烂力":4}}]},{"id":7,"q":"你如何看待自己的缺点？","o":[{"t":"我没有缺点","s":{"自我感觉良好度":5,"嘴硬程度":4}},{"t":"有，但我不改","s":{"嘴硬程度":5,"摆烂力":4}},{"t":"努力改正中","s":{"人间清醒度":4,"打工人觉悟":3}},{"t":"缺点是优点的前置条件","s":{"自我感觉良好度":4,"整活频率":3}}]},{"id":8,"q":"你如何看待社交？","o":[{"t":"社交是生命的意义","s":{"社牛残留量":5,"社恐指数":1}},{"t":"必要的社交还是要有的","s":{"表面正常值":4,"社恐指数":2}},{"t":"能不社交就不社交","s":{"社恐指数":5,"摆烂力":3}},{"t":"社交是浪费时间的活动","s":{"社恐指数":4,"人间清醒度":3}}]},{"id":9,"q":"你如何看待工作？","o":[{"t":"工作是人生的意义","s":{"打工人觉悟":5,"工具人倾向":4}},{"t":"工作是为了生活","s":{"人间清醒度":4,"摆烂力":2}},{"t":"工作是为了钱","s":{"人间清醒度":5,"摆烂力":3}},{"t":"工作是不存在的","s":{"摆烂力":5,"嘴硬程度":4}}]},{"id":10,"q":"你如何看待情绪？","o":[{"t":"情绪要表达出来","s":{"情绪稳定性（反向）":4,"内心戏浓度":3}},{"t":"情绪要控制好","s":{"表面正常值":4,"情绪稳定性（反向）":2}},{"t":"情绪是多余的","s":{"嘴硬程度":4,"人间清醒度":4}},{"t":"情绪是什么？能吃吗？","s":{"整活频率":4,"摆烂力":3}}]},{"id":11,"q":"你如何看待朋友？","o":[{"t":"朋友越多越好","s":{"社牛残留量":5,"社恐指数":1}},{"t":"有几个知心朋友就够了","s":{"人间清醒度":4,"社恐指数":2}},{"t":"朋友是累赘","s":{"社恐指数":5,"嘴硬程度":4}},{"t":"朋友是拿来用的","s":{"工具人倾向":1,"嘴硬程度":5}}]},{"id":12,"q":"你如何看待失败？","o":[{"t":"失败是成功之母","s":{"打工人觉悟":4,"人间清醒度":4}},{"t":"失败是很正常的事","s":{"人间清醒度":5,"情绪稳定性（反向）":2}},{"t":"失败是很丢脸的事","s":{"玻璃心厚度":5,"自我感觉良好度":3}},{"t":"失败是什么？我没失败过","s":{"自我感觉良好度":5,"嘴硬程度":5}}]},{"id":13,"q":"你如何看待拖延？","o":[{"t":"绝不拖延，立刻行动","s":{"打工人觉悟":5,"拖延症等级":1}},{"t":"偶尔拖延一下没关系","s":{"拖延症等级":3,"摆烂力":2}},{"t":"拖延是我的常态","s":{"拖延症等级":5,"摆烂力":4}},{"t":"拖延是一门艺术","s":{"整活频率":4,"摆烂力":3}}]},{"id":14,"q":"你如何看待自己？","o":[{"t":"我很优秀","s":{"自我感觉良好度":5,"人间清醒度":2}},{"t":"我还不错","s":{"自我感觉良好度":3,"表面正常值":4}},{"t":"我很普通","s":{"人间清醒度":4,"摆烂力":3}},{"t":"我是垃圾","s":{"摆烂力":5,"整活频率":4}}]},{"id":15,"q":"你如何看待生活？","o":[{"t":"生活是美好的","s":{"表面正常值":4,"自我感觉良好度":3}},{"t":"生活是苟且","s":{"人间清醒度":4,"摆烂力":3}},{"t":"生活是痛苦","s":{"情绪稳定性（反向）":4,"玻璃心厚度":3}},{"t":"生活是什么？我玩游戏","s":{"网瘾深度":5,"摆烂力":4}}]},{"id":16,"q":"你如何看待未来？","o":[{"t":"未来充满希望","s":{"自我感觉良好度":4,"人间清醒度":3}},{"t":"未来有挑战也有机会","s":{"人间清醒度":5,"表面正常值":4}},{"t":"未来一片黑暗","s":{"情绪稳定性（反向）":4,"玻璃心厚度":4}},{"t":"未来？管它呢","s":{"摆烂力":5,"网瘾深度":4}}]},{"id":17,"q":"你如何看待网络？","o":[{"t":"网络是工具","s":{"人间清醒度":5,"网瘾深度":1}},{"t":"网络是生活的一部分","s":{"网瘾深度":3,"表面正常值":3}},{"t":"网络是我的世界","s":{"网瘾深度":5,"社恐指数":4}},{"t":"网络是什么？我要打游戏","s":{"网瘾深度":5,"整活频率":4}}]},{"id":18,"q":"你如何看待时间？","o":[{"t":"时间就是金钱","s":{"打工人觉悟":4,"拖延症等级":1}},{"t":"时间要珍惜，但也要享受","s":{"人间清醒度":4,"拖延症等级":2}},{"t":"时间多得是，不着急","s":{"拖延症等级":5,"摆烂力":4}},{"t":"时间是什么？能吃吗？","s":{"整活频率":4,"摆烂力":5}}]},{"id":19,"q":"你如何看待规则？","o":[{"t":"规则必须遵守","s":{"打工人觉悟":4,"表面正常值":4}},{"t":"规则可以灵活处理","s":{"人间清醒度":4,"整活频率":3}},{"t":"规则就是用来打破的","s":{"整活频率":5,"嘴硬程度":4}},{"t":"规则是什么？没听说过","s":{"摆烂力":5,"嘴硬程度":5}}]},{"id":20,"q":"你最后想说什么？","o":[{"t":"我是最棒的","s":{"自我感觉良好度":5,"嘴硬程度":3}},{"t":"我很正常","s":{"表面正常值":5,"人间清醒度":3}},{"t":"我是垃圾","s":{"摆烂力":5,"整活频率":4}},{"t":"我无所谓","s":{"摆烂力":4,"嘴硬程度":4}}]}];
    const results = {"DEAD":{"n":"死者","en":"DEAD","slogan":"恭喜你，你是人群中最透明的那个。","desc":["你是职场食物链中那个最容易被遗忘的存在。","你安静、低调、不争不抢。","你的内心戏很足，但表面风平浪静。","你的人生格言：安静是最好的保护色。"]},"FUCK":{"n":"草者","en":"FUCK","slogan":"你的情绪就像过山车，但只有你在车上。","desc":["你是行走的情绪炸弹，随时可能爆炸。","你的内心戏非常丰富，各种剧本在脑海里轮番上演。","你不是坏人，你只是情绪管理能力为零。","你的人生格言：情绪是我的语言。"]},"ATM":{"n":"ATM-er","en":"ATM","slogan":"你的存在意义就是让别人占便宜。","desc":["你是人肉提款机，永远在付出，永远被利用。","你可能总是在借钱给别人，总是在帮别人做事。","你不是没有原则，你只是太善良。","你的人生格言：付出是我的天性。"]},"MALO":{"n":"吗喽","en":"MALO","slogan":"你是职场食物链底端的吉祥物。","desc":["你是职场食物链底端的吉祥物。老板说跳，你问多高。","你可能已经习惯了被压榨，甚至觉得这是你的使命。","你可能很努力，但你的努力可能被忽视。","你的人生格言：听话是我的天职。"]},"SHIT":{"n":"狗屎人","en":"SHIT","slogan":"你是行走的负能量发射器。","desc":["你是行走的负能量发射器。","你可能对什么都看不惯，可能对什么都不满意。","你可能不是故意要这样，你可能只是太真实。","你的人生格言：真实是我的本性。"]}};
    const dimColors = {"社恐指数":"#00ff88","摆烂力":"#bf5fff","嘴硬程度":"#00cfff","表面正常值":"#ff6b6b","内心戏浓度":"#ffd93d","工具人倾向":"#6bcb77","整活频率":"#ff9ff3","情绪稳定性（反向）":"#ff8c42","自我感觉良好度":"#00d9ff","拖延症等级":"#c56cf0","社牛残留量":"#17c0eb","玻璃心厚度":"#ff6b81","打工人觉悟":"#00ff88","网瘾深度":"#bf5fff","人间清醒度":"#00cfff"};

    let currentQ = 0;
    let scores = {};
    let calculatedType = '';
    let calculatedTopDims = [];

    function checkSharedResult() {
      const params = new URLSearchParams(window.location.search);
      const type = params.get('r');
      if (type && results[type]) {
        calculatedType = type;
        const r = results[type];
        document.getElementById('coverPage').style.display = 'none';
        document.getElementById('resultPage').style.display = 'block';
        const banner = document.createElement('div');
        banner.style.cssText = 'background:rgba(255,110,180,0.2);border:1px solid rgba(255,110,180,0.3);border-radius:16px;padding:12px 16px;margin-bottom:20px;font-size:14px;color:rgba(255,255,255,0.8);text-align:center;';
        banner.innerHTML = '👀 朋友觉得你很搞笑，点进来看看？<br><a href="./" style="color:#ff6eb4;text-decoration:none;">我也测一测 →</a>';
        document.getElementById('resultPage').prepend(banner);
        renderResult(type, r);
        return true;
      }
      return false;
    }

    function startQuiz() {
      document.getElementById('coverPage').style.display = 'none';
      document.getElementById('quizPage').style.display = 'block';
      renderProgress();
      renderQuestion();
    }

    function renderProgress() {
      const bar = document.getElementById('progressBar');
      bar.innerHTML = '';
      for (let i = 0; i < questions.length; i++) {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        if (i < currentQ) dot.classList.add('done');
        if (i === currentQ) dot.classList.add('current');
        bar.appendChild(dot);
      }
    }

    function renderQuestion() {
      const q = questions[currentQ];
      document.getElementById('questionNum').textContent = `第 ${currentQ + 1} / ${questions.length} 题`;
      document.getElementById('questionText').textContent = q.q;
      const opts = document.getElementById('options');
      opts.innerHTML = '';
      q.o.forEach((opt) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.t;
        btn.onclick = () => selectOption(opt.s);
        opts.appendChild(btn);
      });
    }

    function selectOption(s) {
      Object.keys(s).forEach(k => { scores[k] = (scores[k] || 0) + s[k]; });
      currentQ++;
      if (currentQ < questions.length) { renderProgress(); renderQuestion(); }
      else { showLoading(); }
    }

    function showLoading() {
      document.getElementById('quizPage').style.display = 'none';
      document.getElementById('loadingPage').style.display = 'block';
      setTimeout(showResult, 1800);
    }

    function showResult() {
      document.getElementById('loadingPage').style.display = 'none';
      document.getElementById('resultPage').style.display = 'block';
      calculatedType = calculateResult();
      calculatedTopDims = getTopDimensions();
      const r = results[calculatedType];
      renderResult(calculatedType, r);
      createConfetti();
    }

    function renderResult(type, r) {
      document.getElementById('resultBadge').textContent = type === 'DEAD' ? '💀' : type === 'FUCK' ? '😤' : type === 'ATM' ? '🏧' : type === 'MALO' ? '🐒' : '💩';
      document.getElementById('resultType').textContent = r.n;
      document.getElementById('resultEn').textContent = r.en;
      document.getElementById('resultSlogan').textContent = r.slogan;
      document.getElementById('resultDesc').innerHTML = r.desc.map(d => `<p>${d}</p>`).join('');
      const topDims = calculatedTopDims.length ? calculatedTopDims : getTopDimensions();
      const chart = document.getElementById('dimensionsChart');
      chart.innerHTML = '';
      topDims.forEach(dim => {
        const pct = Math.min(100, (dim.score / 25) * 100);
        const item = document.createElement('div');
        item.className = 'dimension-item';
        item.innerHTML = `<div class="dimension-header"><span class="dimension-name">${dim.name}</span><span class="dimension-value" style="color:${dim.color}">${dim.score}分</span></div><div class="dimension-bar"><div class="dimension-fill" style="width:0%;background:${dim.color}" data-width="${pct}%"></div></div>`;
        chart.appendChild(item);
      });
      setTimeout(() => document.querySelectorAll('.dimension-fill').forEach(bar => bar.style.width = bar.dataset.width), 100);
    }

    function calculateResult() {
      const ds = scores;
      const s = {
        DEAD: (ds['社恐指数']||0)+(ds['表面正常值']||0)+(ds['工具人倾向']||0),
        FUCK: (ds['情绪稳定性（反向）']||0)+(ds['内心戏浓度']||0)+(ds['玻璃心厚度']||0),
        ATM:  (ds['工具人倾向']||0)+(ds['打工人觉悟']||0)+(ds['自我感觉良好度']||0),
        MALO: (ds['打工人觉悟']||0)+(ds['社恐指数']||0)+(ds['拖延症等级']||0),
        SHIT: (ds['嘴硬程度']||0)+(ds['摆烂力']||0)+(ds['整活频率']||0)
      };
      return Object.keys(s).reduce((a,b) => s[a]>s[b] ? a : b);
    }

    function getTopDimensions() {
      return Object.keys(scores).map(k => ({name:k, score:scores[k], color:dimColors[k]||'#fff'}))
        .sort((a,b) => b.score - a.score).slice(0,6);
    }

    function createConfetti() {
      const colors = ['#ff6eb4','#ffd93d','#00d9ff','#bf5fff','#6bcb77'];
      for (let i = 0; i < 50; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.cssText = `position:fixed;width:10px;height:10px;border-radius:50%;background:${colors[i%5]};left:${Math.random()*100}vw;top:100vh;animation:confetti 2s ease-out forwards;pointer-events:none;animation-delay:${Math.random()}s`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
      }
    }

    // ========== 分享图片生成 ==========
    async function generateShareImage() {
      const btn = document.getElementById('shareImgBtn');
      btn.disabled = true;
      btn.innerHTML = '<span>⏳</span> 生成中...';

      const r = results[calculatedType];
      const card = document.getElementById('shareCardCanvas');

      // 填充卡片内容
      document.getElementById('cardBadge').textContent = calculatedType === 'DEAD' ? '💀' : calculatedType === 'FUCK' ? '😤' : calculatedType === 'ATM' ? '🏧' : calculatedType === 'MALO' ? '🐒' : '💩';
      document.getElementById('cardType').textContent = r.n;
      document.getElementById('cardEn').textContent = r.en;
      document.getElementById('cardSlogan').textContent = r.slogan;
      document.getElementById('cardDesc').innerHTML = r.desc.map(d => `<p style="font-size:14px;line-height:1.9;color:rgba(255,255,255,0.85);margin-bottom:6px;">${d}</p>`).join('');
      const dimsEl = document.getElementById('cardDims');
      dimsEl.innerHTML = '';
      calculatedTopDims.slice(0,4).forEach(dim => {
        const pct = Math.min(100, (dim.score / 25) * 100);
        dimsEl.innerHTML += `<div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:4px;">
            <span>${dim.name}</span><span style="font-weight:700;color:${dim.color}">${dim.score}分</span>
          </div>
          <div style="height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:${dim.color};border-radius:3px;"></div>
          </div>
        </div>`;
      });

      card.style.display = 'block';

      try {
        const canvas = await html2canvas(card, {
          backgroundColor: null,
          scale: 2,
          useCORS: true,
          logging: false
        });

        canvas.toBlob(blob => {
          if (!blob) {
            alert('图片生成失败，请重试');
            btn.disabled = false;
            btn.innerHTML = '<span>📸</span> 生成分享图片';
            card.style.display = 'none';
            return;
          }

          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `SBTI_${r.n}_${Date.now()}.png`;
          a.click();
          URL.revokeObjectURL(url);

          btn.disabled = false;
          btn.innerHTML = '<span>📸</span> 生成分享图片';
          card.style.display = 'none';
        }, 'image/png');
      } catch (e) {
        alert('图片生成失败，请重试');
        btn.disabled = false;
        btn.innerHTML = '<span>📸</span> 生成分享图片';
        card.style.display = 'none';
      }
    }

    // ========== 链接分享 ==========
    function getShareLink() {
      return `${location.origin}${location.pathname}?r=${calculatedType}`;
    }
    function getShareText() {
      return `我在 SBTI 测试中测出了「${results[calculatedType].n}」人格！😱 你也来试试？`;
    }

    function openShareModal() {
      document.getElementById('shareLinkText').textContent = getShareLink();
      document.getElementById('copySuccess').style.display = 'none';
      document.getElementById('shareModal').classList.add('active');
    }
    function closeShareModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('shareModal').classList.remove('active');
    }
    function copyShareLink() {
      navigator.clipboard.writeText(getShareLink()).then(() => {
        document.getElementById('copySuccess').style.display = 'block';
        setTimeout(() => document.getElementById('copySuccess').style.display = 'none', 3000);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = getShareLink();
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); ta.remove();
        document.getElementById('copySuccess').style.display = 'block';
        setTimeout(() => document.getElementById('copySuccess').style.display = 'none', 3000);
      });
    }
    function shareToWechat() { copyShareLink(); alert('链接已复制！打开微信粘贴发送给朋友。'); }
    function shareToWeibo() { window.open(`https://service.weibo.com/share/share.php?url=${encodeURIComponent(getShareLink())}&title=${encodeURIComponent(getShareText())}`, '_blank'); }
    function shareToQQ() { window.open(`https://connect.qq.com/widget/shareqq/index.html?url=${encodeURIComponent(getShareLink())}&desc=${encodeURIComponent(getShareText())}`, '_blank'); }
    function shareToTwitter() { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(getShareText())}&url=${encodeURIComponent(getShareLink())}`, '_blank'); }
    function shareToTelegram() { window.open(`https://t.me/share/url?url=${encodeURIComponent(getShareLink())}&text=${encodeURIComponent(getShareText())}`, '_blank'); }

    function retest() {
      currentQ = 0; scores = {}; calculatedType = ''; calculatedTopDims = [];
      history.replaceState({}, '', location.pathname);
      document.getElementById('resultPage').style.display = 'none';
      document.getElementById('coverPage').style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', () => { checkSharedResult(); });
  </script>
</body>
